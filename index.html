<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programme Musculation — Haut du Corps</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo-mark">HB</div>
      <div>
        <h1 class="site-title">Programme Haut du Corps</h1>
        <p class="site-sub">Débutant · 5 jours · Haltères + poids du corps</p>
      </div>
      <div class="header-stats">
        <div class="stat"><span class="stat-val">3×</span><span class="stat-label">séries</span></div>
        <div class="stat"><span class="stat-val">~40</span><span class="stat-label">min</span></div>
        <div class="stat"><span class="stat-val">8kg</span><span class="stat-label">max</span></div>
        <a href="calories.html" style="
          display:inline-flex; align-items:center; gap:6px;
          padding:7px 14px; border-radius:99px;
          background:#EEEDFE; border:1px solid rgba(83,74,183,0.3);
          font-size:13px; font-weight:500; color:#3C3489; text-decoration:none;
          transition:background 0.15s;
          margin-left:8px;
        " onmouseover="this.style.background='#E0DEFF'" onmouseout="this.style.background='#EEEDFE'">
          🔥 Calories &amp; Macros
        </a>
      </div>
    </div>
  </header>

  <main class="main">
    <nav class="week-nav" id="weekNav"></nav>
    <section class="detail" id="detail"></section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
